name: Sync Specs & Deploy

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Sync specific namespace (bip, nip, bolt, bep) or leave empty for all'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run spec sync
        env:
          GITHUB_TOKEN: ${{ secrets.SPEC_SYNC_GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.namespace }}" ]; then
            ARGS="--namespace ${{ github.event.inputs.namespace }}"
          fi
          npx tsx scripts/sync-all.ts $ARGS

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/synced/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated spec data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/synced/
          git commit -m "sync: update spec data $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger Vercel deploy
        if: steps.changes.outputs.changed == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
            echo "Deploy triggered"
          else
            echo "No VERCEL_DEPLOY_HOOK secret set, skipping deploy trigger"
          fi
